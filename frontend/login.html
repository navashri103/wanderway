<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — WanderWay</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">WanderWay ✈</div>
    <p class="auth-sub">Your complete travel companion</p>

    <div id="alert-box"></div>

    <div class="tabs">
      <div class="tab active" data-tab="login">Login</div>
      <div class="tab" data-tab="register">Register</div>
    </div>

    <!-- LOGIN -->
    <div id="panel-login" class="tab-panel">
      <form id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@email.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Login →</button>
      </form>
      <p class="text-muted text-center mt-2">
        Admin? use <strong>admin@wanderway.com</strong> / <strong>admin123</strong>
      </p>
    </div>

    <!-- REGISTER -->
    <div id="panel-register" class="tab-panel hidden">
      <form id="register-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your name" required/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="you@email.com" required/>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="reg-phone" placeholder="9876543210"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Create Account →</button>
      </form>
    </div>

    <p class="text-muted text-center mt-2">
      <a href="index.html" style="color:var(--primary)">← Back to Home</a>
    </p>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
